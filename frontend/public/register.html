<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnglishUp — Register</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>

    <div class="auth-page">
      <div class="auth-card">

        <header class="auth-header">
          <h1>EnglishUp</h1>
          <p class="auth-subtitle">Get one step closer to your English improvement journey</p>
          <p class="auth-note">These details are required only once. You won't need to fill them again.</p>
        </header>

        <main>
          <form class="auth-form" action=""http://localhost:8000/api/v1/auth/register"" method="post">

            <div class="form-group">
              <label for="name">Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email address"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Create a password"
                required
              />
            </div>

            <div class="form-group">
              <label for="age">Age</label>
              <input
                type="number"
                id="age"
                name="age"
                placeholder="Enter your age"
                min="1"
                max="120"
                required
              />
            </div>

            <div class="form-group">
              <label for="job-role">Job Role</label>
              <select id="job-role" name="job_role" required>
                <option value="" disabled selected>Select your job role</option>
                <option value="student">Student</option>
                <option value="working-professional">Working Professional</option>
                <option value="job-seeker">Job Seeker</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="auth-actions">
              <button type="submit" class="btn btn-primary">Create Account</button>
            </div>

          </form>

          <div class="auth-links">
            <a href="login.html">Already have an account? Login</a>
            <a href="index.html">Back to Home</a>
          </div>
        </main>

      </div>
    </div>

  </body>
</html>
