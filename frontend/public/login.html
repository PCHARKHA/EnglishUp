<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnglishUp — Login</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>

    <div class="auth-page">
      <div class="auth-card">

        <header class="auth-header">
          <h1>EnglishUp</h1>
          <p class="auth-subtitle">Continue your English improvement journey</p>
          <p class="auth-note">Log in using the email and password you registered with.</p>
        </header>

        <main>
          <form class="auth-form" action="dashboard.html" method="get">

            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email address"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
            </div>

            <div class="auth-actions">
              <button type="submit" class="btn btn-primary">Login</button>
            </div>

          </form>

          <div class="auth-links">
            <a href="register.html">Don't have an account? Register</a>
            <a href="index.html">Back to Home</a>
          </div>
        </main>

      </div>
    </div>

  </body>
</html>
